<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Roshan</title>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #ff6ec4, #7873f5);
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        font-size: 80px;
        color: white;
        text-shadow: 4px 4px 10px black;
        animation: glow 1.5s infinite alternate;
        padding: 20px;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0, 0 0 30px #ff69b4;
        }
        to {
            text-shadow: 0 0 20px #fff, 0 0 40px #ff0, 0 0 60px #ff1493;
        }
    }
</style>
</head>
<body>

<h1>🎉 HAPPY BIRTHDAY TO YOU ROSHAN 🎂</h1>

</body>
</html>
